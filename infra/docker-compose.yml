# Self-host stack: Specboard web + Postgres. The hosted SaaS runs the same
# image on Fly.io Machines + Fly Postgres; auth (Better Auth) runs
# in-app against Postgres in both shapes. Migrations: infra/migrations/.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: specboard
    ports:
      - "5432:5432"
    volumes:
      - specboard_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/specboard
      # Single-workspace self-host: auth/SSO are commercial add-ons.
      SPECBOARD_SELF_HOST: "true"
      # Set to "true" to reject sign-ups from consumer email providers
      # (gmail.com, outlook.com, ...). Off by default for self-host.
      SPECBOARD_BLOCK_PUBLIC_EMAIL_DOMAINS: "false"
      # Optional outbound email (verification / password reset) via Postmark.
      # Unset = emails are skipped with a logged warning.
      # POSTMARK_SERVER_TOKEN: ""
      # EMAIL_FROM: "Specboard <no-reply@example.com>"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  specboard_db:
