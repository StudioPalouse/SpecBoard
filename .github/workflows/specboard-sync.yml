# Dogfooding loop: keep Specboard work items in sync with this repo's PRs.
#   - PR opened / updated  -> touched specs go in_progress and the PR is linked
#   - PR merged            -> touched specs go done
# "Touched specs" = changed specs/**/spec.md, plus any `Spec: <id>` trailer in
# the PR body (for code-only PRs). Needs repo secrets SPECBOARD_URL and
# SPECBOARD_TOKEN (an API key for a dedicated bot user); without them it no-ops.
name: Specboard Sync

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

# Latest event per PR wins; cancel a superseded run.
concurrency:
  group: specboard-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @specboard/cli build
      - name: Sync work items from the PR
        env:
          SPECBOARD_URL: ${{ secrets.SPECBOARD_URL }}
          SPECBOARD_TOKEN: ${{ secrets.SPECBOARD_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
        run: bash scripts/specboard/sync-pr.sh
